name: Deploy to CapRover

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install caprover CLI
        run: npm install -g caprover

      - name: Deploy to CapRover
        run: |
          caprover deploy \
            --host "${{ vars.CAPROVER_URL }}" \
            --password "${{ secrets.CAPROVER_PASSWORD }}" \
            --appName "${{ vars.BACKEND_APP }}"
