name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check TypeScript compiles
        run: |
          cd backend
          npm ci --prefer-offline
          npm run build
