name: Deploy to CapRover

on:
  push:
    branches: [main]

jobs:
  setup:
    name: Configure CapRover (first-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Configure CapRover apps
        run: node .github/scripts/setup.mjs
        env:
          CAPROVER_URL:       ${{ vars.CAPROVER_URL }}
          CAPROVER_PASSWORD:  ${{ secrets.CAPROVER_PASSWORD }}
          BACKEND_APP:        ${{ vars.BACKEND_APP }}
          FRONTEND_APP:       ${{ vars.FRONTEND_APP }}

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Install caprover CLI
        run: npm install -g caprover

      - name: Package backend
        run: |
          tar \
            --exclude='./node_modules' \
            --exclude='./dist' \
            --exclude='./.env' \
            --exclude='*.log' \
            -czf backend.tar.gz \
            -C backend .

      - name: Deploy backend to CapRover
        run: |
          caprover deploy \
            --host "${{ vars.CAPROVER_URL }}" \
            --password "${{ secrets.CAPROVER_PASSWORD }}" \
            --appName "${{ vars.BACKEND_APP }}" \
            --tarFile ./backend.tar.gz

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - name: Install caprover CLI
        run: npm install -g caprover

      - name: Package frontend
        run: |
          tar \
            --exclude='./node_modules' \
            --exclude='./dist' \
            --exclude='./.env' \
            --exclude='*.log' \
            -czf frontend.tar.gz \
            -C frontend .

      - name: Deploy frontend to CapRover
        run: |
          caprover deploy \
            --host "${{ vars.CAPROVER_URL }}" \
            --password "${{ secrets.CAPROVER_PASSWORD }}" \
            --appName "${{ vars.FRONTEND_APP }}" \
            --tarFile ./frontend.tar.gz
