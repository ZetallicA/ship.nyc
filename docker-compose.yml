version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: oath-postgres
    environment:
      POSTGRES_DB: oath_logistics
      POSTGRES_USER: oath
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - oath-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oath -d oath_logistics"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oath-backend
    environment:
      DATABASE_URL: postgresql://oath:${POSTGRES_PASSWORD:-changeme}@postgres:5432/oath_logistics
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@example.com}
      CORS_ALLOW_ALL: "true"
      NODE_ENV: production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - oath-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: oath-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - oath-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  oath-network:
    driver: bridge
